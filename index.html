<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meerakapp Quick Start Guide</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Fix for 'Cannot set property fetch of #<Window>'
      // Some libraries try to polyfill fetch by assignment, which fails in this environment.
      (function() {
        var _fetch = window.fetch;
        var defineFetch = function(obj) {
          if (!obj) return;
          try {
            var descriptor = Object.getOwnPropertyDescriptor(obj, 'fetch');
            if (descriptor && !descriptor.configurable) {
              console.warn('fetch is not configurable, cannot redefine.');
              return;
            }
            Object.defineProperty(obj, 'fetch', {
              get: function() { return _fetch; },
              set: function(v) { 
                console.warn('A library tried to overwrite fetch. This assignment was ignored to prevent a TypeError.');
              },
              configurable: true
            });
          } catch (e) {
            console.warn('Could not redefine fetch:', e.message || e);
          }
        };
        defineFetch(window);
        if (typeof globalThis !== 'undefined') defineFetch(globalThis);
        if (typeof self !== 'undefined') defineFetch(self);
      })();

      if (typeof global === 'undefined') {
        window.global = window;
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
